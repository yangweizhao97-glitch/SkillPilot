services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: career-agent-postgres
    environment:
      POSTGRES_DB: career_agent
      POSTGRES_USER: career_agent
      POSTGRES_PASSWORD: career_agent_dev_password
    ports:
      - "5432:5432"
    volumes:
      - career_agent_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_agent -d career_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: career-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - career_agent_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  career_agent_postgres_data:
  career_agent_redis_data:
