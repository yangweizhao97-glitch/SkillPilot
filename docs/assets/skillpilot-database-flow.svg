<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" role="img" aria-labelledby="title desc">
  <title id="title">SkillPilot database flow ER diagram</title>
  <desc id="desc">A flow-oriented ER diagram for SkillPilot backend database tables.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .group-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .group-note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .table-title { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
      .table-note { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 14; }
      .panel-main { fill: #eef6ff; stroke: #93c5fd; stroke-width: 1.7; rx: 14; }
      .panel-task { fill: #f4f0ff; stroke: #c4b5fd; stroke-width: 1.7; rx: 14; }
      .panel-report { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.7; rx: 14; }
      .panel-interview { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.7; rx: 14; }
      .panel-public { fill: #fdf2f8; stroke: #f9a8d4; stroke-width: 1.7; rx: 14; }
      .table { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; rx: 8; }
      .table-primary { fill: #ffffff; stroke: #2563eb; stroke-width: 1.8; rx: 8; }
      .table-task { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.8; rx: 8; }
      .table-report { fill: #ffffff; stroke: #16a34a; stroke-width: 1.8; rx: 8; }
      .table-interview { fill: #ffffff; stroke: #ea580c; stroke-width: 1.8; rx: 8; }
      .table-public { fill: #ffffff; stroke: #db2777; stroke-width: 1.8; rx: 8; }
      .line { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrowSoft); }
      .line-dashed { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrowSoft); }
      .badge { fill: #e2e8f0; rx: 999; }
      .badge-text { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1260"/>
  <text class="title" x="60" y="64">SkillPilot 数据库表流程图</text>
  <text class="subtitle" x="60" y="96">按后端讲解顺序组织：用户资料入库 -> 私有知识库 -> Agent 任务 -> 报告/计划 -> 模拟面试/导师答疑 -> 公共面经补充</text>

  <rect class="badge" x="60" y="118" width="168" height="30"/>
  <text class="badge-text" x="78" y="138">实线：主业务链路</text>
  <rect class="badge" x="246" y="118" width="190" height="30"/>
  <text class="badge-text" x="264" y="138">虚线：扩展/补充链路</text>
  <rect class="badge" x="454" y="118" width="230" height="30"/>
  <text class="badge-text" x="472" y="138">所有核心表都带 user_id 边界</text>

  <!-- Users -->
  <rect class="panel-main" x="60" y="180" width="250" height="160"/>
  <text class="group-title" x="84" y="216">1. 用户身份</text>
  <text class="group-note" x="84" y="240">鉴权和数据隔离起点</text>
  <rect class="table-primary" x="84" y="266" width="202" height="48"/>
  <text class="table-title" x="104" y="296">users</text>

  <!-- Input material -->
  <rect class="panel-main" x="370" y="180" width="360" height="260"/>
  <text class="group-title" x="394" y="216">2. 文件与文档入库</text>
  <text class="group-note" x="394" y="240">上传、解析、标准化正文</text>
  <rect class="table-primary" x="394" y="266" width="258" height="52"/>
  <text class="table-title" x="414" y="291">uploaded_files</text>
  <text class="table-note" x="414" y="309">原始文件、存储路径、parse_status</text>
  <rect class="table-primary" x="394" y="346" width="258" height="52"/>
  <text class="table-title" x="414" y="371">documents</text>
  <text class="table-note" x="414" y="389">解析后的 content_text、doc_type</text>

  <!-- RAG -->
  <rect class="panel-main" x="790" y="180" width="400" height="260"/>
  <text class="group-title" x="814" y="216">3. 私有知识库 RAG</text>
  <text class="group-note" x="814" y="240">chunk + embedding + hybrid search</text>
  <rect class="table-primary" x="814" y="266" width="288" height="62"/>
  <text class="table-title" x="834" y="292">document_chunks</text>
  <text class="table-note" x="834" y="311">content、token_count、source_locator</text>
  <rect class="table-primary" x="814" y="356" width="288" height="52"/>
  <text class="table-title" x="834" y="381">embedding vector</text>
  <text class="table-note" x="834" y="399">pgvector 字段，默认 1024 维</text>

  <!-- Business resources -->
  <rect class="panel-main" x="1250" y="180" width="420" height="260"/>
  <text class="group-title" x="1274" y="216">4. 业务资源</text>
  <text class="group-note" x="1274" y="240">把 Document 登记成简历和岗位</text>
  <rect class="table-primary" x="1274" y="266" width="260" height="52"/>
  <text class="table-title" x="1294" y="291">resumes</text>
  <text class="table-note" x="1294" y="309">document_id -> documents.id</text>
  <rect class="table-primary" x="1274" y="346" width="260" height="52"/>
  <text class="table-title" x="1294" y="371">jobs</text>
  <text class="table-note" x="1294" y="389">document_id -> documents.id，可存 JD</text>

  <!-- Career task -->
  <rect class="panel-task" x="60" y="510" width="600" height="330"/>
  <text class="group-title" x="84" y="546">5. Agent 异步任务与审计</text>
  <text class="group-note" x="84" y="570">afterCommit + @Async，traceId 串联全过程</text>
  <rect class="table-task" x="84" y="604" width="260" height="62"/>
  <text class="table-title" x="104" y="630">agent_tasks</text>
  <text class="table-note" x="104" y="649">status、progress、trace_id、resume_id、job_id</text>
  <rect class="table-task" x="84" y="706" width="260" height="56"/>
  <text class="table-title" x="104" y="731">agent_execution_logs</text>
  <text class="table-note" x="104" y="749">Agent 步骤、耗时、token、错误摘要</text>
  <rect class="table-task" x="374" y="706" width="244" height="56"/>
  <text class="table-title" x="394" y="731">tool_call_logs</text>
  <text class="table-note" x="394" y="749">工具调用、scope、脱敏输入输出</text>

  <!-- Reports -->
  <rect class="panel-report" x="720" y="510" width="480" height="330"/>
  <text class="group-title" x="744" y="546">6. 分析产物与最终报告</text>
  <text class="group-note" x="744" y="570">结构化 JSON 产物，最终报告做聚合</text>
  <rect class="table-report" x="744" y="604" width="282" height="52"/>
  <text class="table-title" x="764" y="629">job_match_reports</text>
  <text class="table-note" x="764" y="647">岗位匹配、差距、建议</text>
  <rect class="table-report" x="744" y="678" width="282" height="52"/>
  <text class="table-title" x="764" y="703">resume_analysis_reports</text>
  <text class="table-note" x="764" y="721">简历亮点、问题、优化动作</text>
  <rect class="table-report" x="744" y="752" width="282" height="52"/>
  <text class="table-title" x="764" y="777">interview_questions</text>
  <text class="table-note" x="764" y="795">面试题、评分细则、参考答案</text>
  <rect class="table-report" x="1050" y="678" width="126" height="52"/>
  <text class="table-title" x="1070" y="703">final_reports</text>
  <text class="table-note" x="1070" y="721">聚合报告</text>

  <!-- Learning/PDF -->
  <rect class="panel-report" x="1260" y="510" width="410" height="330"/>
  <text class="group-title" x="1284" y="546">7. 报告后续动作</text>
  <text class="group-note" x="1284" y="570">学习计划、PDF 导出复用 final report</text>
  <rect class="table-report" x="1284" y="604" width="286" height="58"/>
  <text class="table-title" x="1304" y="630">learning_plans</text>
  <text class="table-note" x="1304" y="648">task_id + report_id，计划 JSON</text>
  <rect class="table" x="1284" y="706" width="286" height="58"/>
  <text class="table-title" x="1304" y="732">PDF export files</text>
  <text class="table-note" x="1304" y="750">本地导出目录，按 user 隔离</text>

  <!-- Interview -->
  <rect class="panel-interview" x="60" y="910" width="680" height="260"/>
  <text class="group-title" x="84" y="946">8. 模拟面试链路</text>
  <text class="group-note" x="84" y="970">基于简历、岗位和面试题进行多轮评分与复盘</text>
  <rect class="table-interview" x="84" y="1004" width="220" height="52"/>
  <text class="table-title" x="104" y="1029">interview_sessions</text>
  <text class="table-note" x="104" y="1047">resume_id、job_id、status</text>
  <rect class="table-interview" x="334" y="1004" width="220" height="52"/>
  <text class="table-title" x="354" y="1029">interview_messages</text>
  <text class="table-note" x="354" y="1047">问题、回答、消息序列</text>
  <rect class="table-interview" x="84" y="1084" width="260" height="52"/>
  <text class="table-title" x="104" y="1109">interview_answer_evaluations</text>
  <text class="table-note" x="104" y="1127">四维评分、建议、追问</text>
  <rect class="table-interview" x="374" y="1084" width="220" height="52"/>
  <text class="table-title" x="394" y="1109">interview_session_reviews</text>
  <text class="table-note" x="394" y="1127">整场复盘</text>
  <rect class="table-interview" x="606" y="1044" width="108" height="52"/>
  <text class="table-title" x="626" y="1069">memories</text>
  <text class="table-note" x="626" y="1087">长期记忆</text>

  <!-- Tutor -->
  <rect class="panel-interview" x="790" y="910" width="390" height="260"/>
  <text class="group-title" x="814" y="946">9. 导师答疑链路</text>
  <text class="group-note" x="814" y="970">绑定资源 + 会话消息 + 长期记忆</text>
  <rect class="table-interview" x="814" y="1004" width="260" height="58"/>
  <text class="table-title" x="834" y="1030">tutor_sessions</text>
  <text class="table-note" x="834" y="1048">resume/job/question/evaluation/plan</text>
  <rect class="table-interview" x="814" y="1090" width="260" height="58"/>
  <text class="table-title" x="834" y="1116">tutor_messages</text>
  <text class="table-note" x="834" y="1134">流式回答、citations、消息历史</text>

  <!-- Public knowledge -->
  <rect class="panel-public" x="1230" y="910" width="440" height="260"/>
  <text class="group-title" x="1254" y="946">10. 公共面经知识库</text>
  <text class="group-note" x="1254" y="970">补充通用面试知识，不等同用户经历</text>
  <rect class="table-public" x="1254" y="1004" width="260" height="44"/>
  <text class="table-title" x="1274" y="1032">knowledge_sources</text>
  <rect class="table-public" x="1254" y="1062" width="260" height="44"/>
  <text class="table-title" x="1274" y="1090">interview_experiences</text>
  <rect class="table-public" x="1254" y="1120" width="260" height="44"/>
  <text class="table-title" x="1274" y="1148">public_interview_questions</text>
  <rect class="table-public" x="1530" y="1090" width="116" height="44"/>
  <text class="table-title" x="1546" y="1118">evidence</text>

  <!-- Main arrows top -->
  <path class="line" d="M310 260 C340 260 340 292 394 292"/>
  <path class="line" d="M652 292 L814 292"/>
  <path class="line" d="M1102 292 C1160 292 1200 292 1274 292"/>
  <path class="line-soft" d="M652 372 C720 372 744 372 814 382"/>
  <path class="line-soft" d="M652 372 C950 460 1210 372 1274 372"/>

  <!-- Resources to task -->
  <path class="line" d="M1404 398 C1404 462 980 474 360 604"/>
  <path class="line" d="M1534 292 C1640 330 1620 482 344 626"/>

  <!-- RAG to task/tools -->
  <path class="line-soft" d="M958 408 C900 520 640 690 618 734"/>

  <!-- Task to reports -->
  <path class="line" d="M344 635 C482 635 600 630 744 630"/>
  <path class="line" d="M344 635 C520 668 600 704 744 704"/>
  <path class="line" d="M344 635 C520 720 600 778 744 778"/>
  <path class="line" d="M1026 630 C1062 630 1060 678 1050 704"/>
  <path class="line" d="M1026 704 L1050 704"/>
  <path class="line" d="M1026 778 C1070 770 1084 748 1113 730"/>

  <!-- Report to learning/pdf -->
  <path class="line" d="M1176 704 C1214 704 1238 633 1284 633"/>
  <path class="line-soft" d="M1176 704 C1214 704 1238 735 1284 735"/>

  <!-- Interview flow -->
  <path class="line" d="M884 804 C650 855 300 850 194 1004"/>
  <path class="line" d="M1404 398 C1450 848 560 850 194 1004"/>
  <path class="line" d="M304 1030 L334 1030"/>
  <path class="line" d="M444 1056 C420 1072 372 1090 344 1110"/>
  <path class="line" d="M344 1110 L374 1110"/>
  <path class="line-soft" d="M554 1030 C586 1038 590 1060 606 1070"/>

  <!-- Tutor bindings -->
  <path class="line-dashed" d="M1176 704 C1208 850 1020 940 944 1004"/>
  <path class="line-dashed" d="M344 1110 C520 1190 720 1160 814 1119"/>
  <path class="line" d="M944 1062 L944 1090"/>

  <!-- Public knowledge -->
  <path class="line" d="M1384 1048 L1384 1062"/>
  <path class="line" d="M1384 1106 L1384 1120"/>
  <path class="line-soft" d="M1514 1142 C1536 1142 1532 1112 1530 1112"/>
  <path class="line-dashed" d="M1514 1142 C1450 1210 780 1220 494 762"/>
  <path class="line-dashed" d="M1514 1142 C1390 1218 1010 1210 944 1148"/>

  <!-- Inline labels -->
  <text class="label" x="675" y="280">parse</text>
  <text class="label" x="1120" y="280">登记业务资源</text>
  <text class="label" x="515" y="610">创建异步任务</text>
  <text class="label" x="590" y="728">受控工具调用</text>
  <text class="label" x="1210" y="620">生成计划</text>
  <text class="label" x="1210" y="726">导出 PDF</text>
  <text class="label" x="1460" y="1210">公共知识补充，不作为用户事实</text>

  <text class="small" x="60" y="1220">讲解提示：主讲只走 1 -> 2 -> 3 -> 4 -> 5 -> 6；面试官追问时再展开 7/8/9/10。</text>
</svg>
