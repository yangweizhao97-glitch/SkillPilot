name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: career_agent_test
          POSTGRES_USER: career_agent
          POSTGRES_PASSWORD: career_agent_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U career_agent -d career_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/career_agent_test
      POSTGRES_USER: career_agent
      POSTGRES_PASSWORD: career_agent_ci_password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters-long
      DASHSCOPE_API_KEY: ""
      LOGGING_LEVEL_ROOT: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify backend
        run: ./mvnw --batch-mode --no-transfer-progress verify
      - name: Upload prompt regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-regression-report
          path: target/prompt-regression-report.json
          if-no-files-found: warn

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint, test and build
        run: npm run check
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  repository-safety:
    name: Repository safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject tracked local secret files
        shell: bash
        run: |
          tracked=$(git ls-files '.env' '.env.*' | grep -v '^.env.example$' || true)
          if [ -n "$tracked" ]; then
            echo "Tracked local environment files detected:"
            echo "$tracked"
            exit 1
          fi
