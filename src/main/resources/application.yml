spring:
  application:
    name: career-agent
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/career_agent}
    username: ${POSTGRES_USER:career_agent}
    password: ${POSTGRES_PASSWORD:career_agent_dev_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:20MB}
      max-request-size: ${MAX_UPLOAD_SIZE:20MB}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

career-agent:
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-expires-seconds: ${JWT_EXPIRES_SECONDS:7200}
  storage:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    max-upload-size: ${MAX_UPLOAD_SIZE:20MB}
  report:
    pdf:
      export-dir: ${PDF_EXPORT_DIR:./data/exports}
      font-path: ${PDF_FONT_PATH:}
  llm:
    provider: ${LLM_PROVIDER:DASHSCOPE}
    dashscope-api-key: ${DASHSCOPE_API_KEY:}
    base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    chat-model: ${CHAT_MODEL:qwen-flash}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-v4}
    embedding-dimension: ${EMBEDDING_DIMENSION:1024}
    connect-timeout: ${LLM_CONNECT_TIMEOUT:5s}
    read-timeout: ${LLM_READ_TIMEOUT:60s}
    max-retries: ${LLM_MAX_RETRIES:2}
  rag:
    default-top-k: ${RAG_DEFAULT_TOP_K:8}
    max-top-k: ${RAG_MAX_TOP_K:20}
  chunking:
    target-tokens: ${CHUNK_TARGET_TOKENS:700}
    overlap-tokens: ${CHUNK_OVERLAP_TOKENS:100}
  agent:
    max-retries: ${AGENT_MAX_RETRIES:2}
    initial-retry-delay: ${AGENT_INITIAL_RETRY_DELAY:100ms}
    task-thread-pool-size: ${AGENT_TASK_THREAD_POOL_SIZE:4}
    handoff:
      enabled: ${AGENT_HANDOFF_ENABLED:true}
      max-depth: ${AGENT_HANDOFF_MAX_DEPTH:4}
  workflow:
    engine: ${WORKFLOW_ENGINE:spring}
    langgraph:
      base-url: ${LANGGRAPH_BASE_URL:http://localhost:8090}
      connect-timeout: ${LANGGRAPH_CONNECT_TIMEOUT:2s}
      read-timeout: ${LANGGRAPH_READ_TIMEOUT:10s}
      fallback-enabled: ${LANGGRAPH_FALLBACK_ENABLED:true}
  mcp:
    enabled: ${MCP_ENABLED:false}
    endpoint: ${MCP_ENDPOINT:}
    server-name: ${MCP_SERVER_NAME:default}
    protocol-version: ${MCP_PROTOCOL_VERSION:2025-06-18}
    bearer-token: ${MCP_BEARER_TOKEN:}
    connect-timeout: ${MCP_CONNECT_TIMEOUT:2s}
    read-timeout: ${MCP_READ_TIMEOUT:10s}
    max-request-bytes: ${MCP_MAX_REQUEST_BYTES:65536}
    max-response-bytes: ${MCP_MAX_RESPONSE_BYTES:1048576}
    allowed-tools: ${MCP_ALLOWED_TOOLS:}
    allowed-agents: ${MCP_ALLOWED_AGENTS:JOB_MATCH_AGENT,RESUME_ANALYSIS_AGENT,INTERVIEW_QUESTION_AGENT}
