<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 深度研究报告助手</title>
    <style>
      :root {
        --bg: #f5f6f8;
        --panel: #ffffff;
        --line: #dde2ea;
        --text: #172033;
        --muted: #687385;
        --blue: #2563eb;
        --green: #138a4b;
        --red: #c2413a;
        --amber: #a16207;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .topbar {
        max-width: 1440px;
        margin: 0 auto;
        padding: 16px 20px;
        display: grid;
        grid-template-columns: minmax(180px, 260px) 1fr auto;
        gap: 16px;
        align-items: center;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0;
      }
      .query-box {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        background: #fff;
        color: var(--text);
      }
      input {
        height: 42px;
        padding: 0 12px;
      }
      button {
        height: 42px;
        border: 0;
        border-radius: 6px;
        background: var(--blue);
        color: white;
        padding: 0 16px;
        font-weight: 650;
        cursor: pointer;
        white-space: nowrap;
      }
      button.secondary {
        color: var(--text);
        background: #eef2f7;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      main {
        max-width: 1440px;
        margin: 0 auto;
        padding: 18px 20px 28px;
        display: grid;
        grid-template-columns: minmax(300px, 360px) minmax(360px, 1fr) minmax(420px, 0.95fr);
        gap: 16px;
        align-items: start;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .panel-head {
        min-height: 48px;
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .panel-head h2 {
        margin: 0;
        font-size: 15px;
      }
      .panel-body {
        padding: 14px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border-radius: 999px;
        background: #eef2ff;
        color: #2947a9;
        font-size: 12px;
        font-weight: 650;
      }
      .progress {
        height: 8px;
        background: #edf0f4;
        border-radius: 999px;
        overflow: hidden;
        margin-top: 12px;
      }
      .progress span {
        display: block;
        height: 100%;
        width: 0;
        background: var(--blue);
        transition: width 0.2s ease;
      }
      .muted {
        color: var(--muted);
      }
      .timeline {
        display: grid;
        gap: 10px;
      }
      .step {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px;
        background: #fbfcfe;
      }
      .step-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .step-name {
        font-weight: 700;
        font-size: 14px;
      }
      .badge {
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        background: #e9edf3;
        color: var(--muted);
      }
      .badge.success {
        background: #e7f7ee;
        color: var(--green);
      }
      .badge.failed {
        background: #fdecea;
        color: var(--red);
      }
      .tool-detail {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed var(--line);
        font-size: 12px;
        color: var(--muted);
      }
      .json-preview {
        margin: 8px 0 0;
        padding: 9px;
        max-height: 130px;
        overflow: auto;
        background: #f2f4f7;
        border-radius: 6px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #2f3a4e;
      }
      .tabs {
        display: flex;
        gap: 6px;
      }
      .tab {
        height: 30px;
        padding: 0 10px;
        color: var(--text);
        background: #f1f4f8;
        font-size: 13px;
      }
      .tab.active {
        color: #fff;
        background: var(--blue);
      }
      .list {
        display: grid;
        gap: 10px;
      }
      .item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px;
        background: #fff;
      }
      .item-title {
        font-weight: 700;
        font-size: 14px;
        line-height: 1.45;
      }
      .item-meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        word-break: break-word;
      }
      .report {
        white-space: pre-wrap;
        line-height: 1.62;
        font-size: 14px;
        margin: 0;
      }
      .quality {
        display: grid;
        gap: 8px;
      }
      .quality-score {
        font-size: 26px;
        font-weight: 750;
      }
      .empty {
        padding: 26px 14px;
        text-align: center;
        color: var(--muted);
      }
      @media (max-width: 1180px) {
        main {
          grid-template-columns: 1fr;
        }
        .topbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <h1>AI 深度研究报告助手</h1>
        <div class="query-box">
          <input id="query" value="帮我分析 AI Agent 在企业客服场景的落地机会" />
          <button id="submit">开始研究</button>
        </div>
        <button id="cancel" class="secondary" disabled>取消任务</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-head">
          <h2>Agent 执行过程</h2>
          <span id="status-pill" class="status-pill">idle</span>
        </div>
        <div class="panel-body">
          <div id="task-message" class="muted">输入研究主题后，Agent 会显示每一步工具调用。</div>
          <div class="progress"><span id="progress-bar"></span></div>
          <div id="timeline" class="timeline" style="margin-top: 14px">
            <div class="empty">暂无执行记录</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>资料与工具结果</h2>
          <div class="tabs">
            <button class="tab active" data-view="search">搜索</button>
            <button class="tab" data-view="docs">抓取</button>
            <button class="tab" data-view="sources">来源</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="tool-results" class="list">
            <div class="empty">搜索和抓取结果会出现在这里</div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>报告交付</h2>
          <span id="quality-pill" class="badge">未检查</span>
        </div>
        <div class="panel-body">
          <div id="quality" class="quality muted">质量检查结果会在报告生成后显示。</div>
          <hr style="border: 0; border-top: 1px solid var(--line); margin: 14px 0" />
          <pre id="report" class="report muted">报告生成后会显示在这里。</pre>
        </div>
      </section>
    </main>

    <script>
      const submit = document.getElementById("submit");
      const cancel = document.getElementById("cancel");
      const query = document.getElementById("query");
      const statusPill = document.getElementById("status-pill");
      const taskMessage = document.getElementById("task-message");
      const progressBar = document.getElementById("progress-bar");
      const timeline = document.getElementById("timeline");
      const toolResults = document.getElementById("tool-results");
      const report = document.getElementById("report");
      const quality = document.getElementById("quality");
      const qualityPill = document.getElementById("quality-pill");

      let currentTaskId = null;
      let currentView = "search";
      let pollTimer = null;
      let latestDetails = null;

      const skillNames = {
        planner: "研究规划",
        web_search: "网页搜索",
        web_crawler: "网页抓取",
        source_filter: "资料过滤",
        extractor: "事实抽取",
        analyzer: "综合分析",
        citation_manager: "引用整理",
        report_writer: "报告生成",
        quality_check: "质量检查",
      };

      function escapeHtml(text) {
        return String(text ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        }[char]));
      }

      function preview(value) {
        const text = JSON.stringify(value ?? {}, null, 2);
        return text.length > 900 ? `${text.slice(0, 900)}\n...` : text;
      }

      function statusClass(status) {
        if (status === "success" || status === "completed") return "success";
        if (status === "failed" || status === "cancelled") return "failed";
        return "";
      }

      function renderDetails(details) {
        latestDetails = details;
        const task = details.task;
        statusPill.textContent = `${task.status} · ${task.progress}%`;
        statusPill.className = `status-pill ${statusClass(task.status)}`;
        taskMessage.textContent = task.message || "";
        progressBar.style.width = `${task.progress || 0}%`;

        const callsByStep = new Map();
        for (const call of details.skill_calls || []) {
          callsByStep.set(call.skill_name, call);
        }

        if (!details.steps.length) {
          timeline.innerHTML = '<div class="empty">暂无执行记录</div>';
        } else {
          timeline.innerHTML = details.steps.map((step) => {
            const call = callsByStep.get(step.step_name);
            const toolTitle = skillNames[step.step_name] || step.step_name;
            const detail = call ? `
              <div class="tool-detail">
                <div>调用工具：<strong>${escapeHtml(call.skill_name)}</strong> · ${escapeHtml(call.latency_ms)}ms</div>
                <div class="json-preview">${escapeHtml(preview({ input: call.input, output: call.output }))}</div>
              </div>` : "";
            return `
              <div class="step">
                <div class="step-top">
                  <div class="step-name">${escapeHtml(toolTitle)}</div>
                  <span class="badge ${statusClass(step.status)}">${escapeHtml(step.status)}</span>
                </div>
                ${step.error_message ? `<div class="tool-detail">${escapeHtml(step.error_code)}：${escapeHtml(step.error_message)}</div>` : ""}
                ${detail}
              </div>
            `;
          }).join("");
        }

        renderToolResults();
        renderReport(details);

        const terminal = ["completed", "failed", "cancelled"].includes(task.status);
        submit.disabled = !terminal && currentTaskId !== null;
        cancel.disabled = terminal || currentTaskId === null;
        if (!terminal) {
          pollTimer = setTimeout(() => poll(currentTaskId), 700);
        }
      }

      function renderToolResults() {
        if (!latestDetails) return;
        const data = latestDetails;
        if (currentView === "search") {
          const rows = data.search_results || [];
          toolResults.innerHTML = rows.length ? rows.map((item) => `
            <div class="item">
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-meta">Query：${escapeHtml(item.query)}</div>
              <div class="item-meta">${escapeHtml(item.snippet)}</div>
              <div class="item-meta">${escapeHtml(item.url)}</div>
            </div>
          `).join("") : '<div class="empty">暂无搜索结果</div>';
        }
        if (currentView === "docs") {
          const rows = data.documents || [];
          toolResults.innerHTML = rows.length ? rows.map((item) => `
            <div class="item">
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-meta">可信度：${escapeHtml(item.credibility_score)}</div>
              <div class="item-meta">${escapeHtml(item.summary)}</div>
              <div class="item-meta">${escapeHtml(item.url)}</div>
            </div>
          `).join("") : '<div class="empty">暂无抓取文档</div>';
        }
        if (currentView === "sources") {
          const rows = data.sources || [];
          toolResults.innerHTML = rows.length ? rows.map((item) => `
            <div class="item">
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-meta">${escapeHtml(item.summary || item.quote_text || "")}</div>
              <div class="item-meta">${escapeHtml(item.url)}</div>
            </div>
          `).join("") : '<div class="empty">暂无引用来源</div>';
        }
      }

      function renderReport(details) {
        const q = (details.quality || [])[0];
        if (q) {
          qualityPill.textContent = `${q.status} · ${Math.round((q.quality_score || 0) * 100)}分`;
          qualityPill.className = `badge ${q.status === "pass" ? "success" : "failed"}`;
          quality.classList.remove("muted");
          quality.innerHTML = `
            <div class="quality-score">${Math.round((q.quality_score || 0) * 100)}</div>
            <div>${q.issues && q.issues.length ? q.issues.map(escapeHtml).join("；") : "报告结构、引用和内容完整性检查通过。"}</div>
          `;
        }
        if (details.report) {
          report.textContent = details.report.content;
          report.classList.remove("muted");
        }
      }

      async function poll(taskId) {
        const details = await fetch(`/api/research/tasks/${taskId}/details`).then((res) => res.json());
        if (details.error) {
          taskMessage.textContent = `${details.error.code}: ${details.error.message}`;
          submit.disabled = false;
          cancel.disabled = true;
          return;
        }
        renderDetails(details);
      }

      async function startTask() {
        if (pollTimer) clearTimeout(pollTimer);
        submit.disabled = true;
        cancel.disabled = true;
        currentTaskId = null;
        latestDetails = null;
        statusPill.textContent = "creating";
        taskMessage.textContent = "正在创建研究任务";
        progressBar.style.width = "0%";
        timeline.innerHTML = '<div class="empty">任务创建中</div>';
        toolResults.innerHTML = '<div class="empty">等待工具返回结果</div>';
        quality.textContent = "质量检查结果会在报告生成后显示。";
        quality.classList.add("muted");
        qualityPill.textContent = "未检查";
        qualityPill.className = "badge";
        report.textContent = "报告生成后会显示在这里。";
        report.classList.add("muted");

        const response = await fetch("/api/research/tasks", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            query: query.value,
            depth: "standard",
            output_format: "markdown",
          }),
        });
        const result = await response.json();
        if (result.error) {
          taskMessage.textContent = `${result.error.code}: ${result.error.message}`;
          submit.disabled = false;
          return;
        }
        currentTaskId = result.task_id;
        cancel.disabled = false;
        poll(currentTaskId);
      }

      async function cancelTask() {
        if (!currentTaskId) return;
        await fetch(`/api/research/tasks/${currentTaskId}/cancel`, { method: "POST" });
        if (pollTimer) clearTimeout(pollTimer);
        poll(currentTaskId);
      }

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          currentView = tab.dataset.view;
          renderToolResults();
        });
      });

      submit.addEventListener("click", startTask);
      cancel.addEventListener("click", cancelTask);
    </script>
  </body>
</html>
